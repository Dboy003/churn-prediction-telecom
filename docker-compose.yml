# =============================================================
# DOCKER-COMPOSE - Orchestration des conteneurs
# =============================================================

version: '3.8'

services:
  # Service API FastAPI
  api:
    build: .
    container_name: churn-prediction-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
    environment:
      - PYTHONPATH=/app
    restart: unless-stopped